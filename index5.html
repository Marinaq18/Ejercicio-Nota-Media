<!DOCTYPE html>
<html>
<head>
    <title>Nota media</title>
</head>
<body>
    <button onclick="notamedia()">Media</button>
<script type="text/javascript">
    function notamedia(){
        let numNotas= parseInt(prompt("Dime el número de notas"));
        let suma=0;
        let nota;
        for (let i=1;i<=numNotas;i++){
            nota = parseInt(prompt("Dime una nota"));
            suma = suma + nota;
        }
        let media = suma/numNotas;
        alert("La media es " + media);
    }
   
</script> 

</body>
</html>
